<!doctype html>
<html lang="en" class="h-full antialiased">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Ruthie&display=swap"
		/>
		%sveltekit.head%
		<script>
			(function () {
				try {
					var theme = localStorage.getItem("sleeksign:theme");
					if (theme === "dark") document.documentElement.classList.add("dark");
				} catch (e) {}
			})();
		</script>
	</head>
	<body class="flex min-h-full flex-col font-sans" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
